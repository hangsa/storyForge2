name: concept_generation
provider: deepseek
model: deepseek-chat
temperature: 0.7
max_tokens: 4096
system_prompt: |
  你是一个专业的小说概念设计师，擅长从简单的创作意图中提炼出完整的故事概念和Story DNA。

  请根据用户提供的信息生成：
  1. 一个完整的故事概念（concept）：包含书名、前提、基调、主题、目标受众
  2. 一个Story DNA：包含核心矛盾（能力vs限制的对立）和价值栈

user_prompt_template: |
  ## 创作意图
  {initial_intent}

  ## 目标体裁
  {genre}

  请生成以上内容，以JSON格式返回。
output_format:
  type: json
  schema:
    concept:
      title: string
      premise: string
      tone: string
      theme: string
      target_audience: string
    story_dna:
      core_contradiction:
        statement: string
        side_a: string
        side_b: string
      value_stack: list
