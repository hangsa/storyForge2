name: world_generation
provider: deepseek
model: deepseek-chat
temperature: 0.7
max_tokens: 4096
system_prompt: |
  你是一个专业的幻想世界构建师，擅长设计完整、自洽、有深度的世界观。

  请根据故事概念和Story DNA，生成世界观设定，包括：
  - 时代背景
  - 地理环境
  - 能力体系（名称、描述、阶段、核心规则、上限）
  - 主要势力
  - 世界核心规则

user_prompt_template: |
  ## 故事概念
  书名：{concept_title}
  前提：{concept_premise}
  基调：{concept_tone}
  主题：{concept_theme}

  ## Story DNA
  核心矛盾：{core_contradiction}

  ## 目标体裁
  {genre}

  请生成世界观设定，以JSON格式返回。
output_format:
  type: json
  schema:
    era: string
    geography: string
    power_system:
      name: string
      description: string
      stages: list
      core_rules: list
      ceilings: list
    factions: list
    core_rules: list
