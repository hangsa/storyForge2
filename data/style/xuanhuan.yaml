# 玄幻 (Xuanhuan) Genre Template
# Eastern fantasy with bloodline powers, mythical beasts, and world-spanning conflicts.

name: xuanhuan
description: >
  玄幻体裁——融合东方神话与架空幻想，以血脉觉醒、远古传承、
  异兽契约和大陆争霸为核心的大型奇幻小说类型。

pacing:
  min_beats_per_1k: 1.4
  escalation_interval: 4
  action_ratio: 0.40
  max_consecutive_non_action: 2
  chapter_words:
    min: 3000
    max: 6000
  scene_words:
    min: 500
    max: 2200

tone: >
  宏大气魄，热血激昂。世界辽阔，种族林立，主角在波澜壮阔的
  时代洪流中崛起。战斗描写要有毁灭感和史诗感，情感要真挚浓烈。

style_rules:
  - "战斗场景要有地形改变和环境破坏描写，体现力量层次"
  - "血脉或传承觉醒时要有完整的异象和内心变化描写"
  - "每10章至少引入一个新的势力或种族拓展世界观"
  - "主角成长要有明确的阶段标志（血脉等级/战兽进化/领地扩张）"
  - "大型战争场景需兼顾宏观战场和个人对决"
  - "奇遇和机缘要有代价或隐患，不能无代价变强"
  - "配角要有独立的动机和成长线，不能只是主角的陪衬"

writing_formula:
  sentence:
    short_ratio: 0.38
    medium_ratio: 0.45
    long_ratio: 0.17
  dialogue:
    max_consecutive_lines: 8
    action_beat_interval: 4
    tag_variety: "high"
  paragraph:
    max_sentences: 5
    max_words_per_paragraph: 300

taboo_words:
  - "放弃抵抗"
  - "我不行了"
  - "太强了打不过"
  - "就这样吧"
  - "无聊的战斗"
  # Overused cliches (western fantasy tropes in CN setting)
  - "魔法师"
  - "骑士精神"

taboos:
  - name: "血统至上"
    type: "sliding_window"
    keywords: ["血脉压制", "天生高贵", "血统无敌", "出身决定一切", "低贱血脉", "血脉歧视"]
    max_chars: 300
    severity: warning

  - name: "无代价变强"
    type: "consecutive_match"
    failure_keywords: ["轻松突破", "轻易获得", "无人能挡", "秒杀", "碾压一切", "毫无压力"]
    max_consecutive: 2
    severity: error

  - name: "猥琐发育"
    type: "sliding_window"
    keywords: ["躲起来修炼", "不敢出面", "苟且偷生", "胆小怕事", "缩头乌龟", "贪生怕死"]
    max_chars: 250
    severity: error

trope_patterns:
  - name: "血脉觉醒"
    description: "主角血脉力量苏醒，实力大幅提升"
    min_interval: 5
  - name: "魔兽契约"
    description: "与强大魔兽/神兽签订契约"
    max_per_volume: 2
  - name: "遗迹探索"
    description: "探索远古遗迹获得传承或神器"
    min_interval: 4
  - name: "大陆争霸"
    description: "势力之间的领土和资源争夺"
    min_interval: 8
  - name: "位面战争"
    description: "不同位面/大陆之间的全面战争"
    max_per_volume: 1

reader_targets:
  curiosity_base: 0.55
  tension_peak: 0.80
  satisfaction_min: 0.55
  frustration_max: 0.30
  fatigue_warning: 0.40
  addiction_target: 0.70
  discussion_potential_min: 0.45

model_preferences:
  creative_core: "deepseek-chat"
  temperature: 0.9

style_formula:
  sentence:
    avg_length_max: 32
    short_pct_min: 30
    long_pct_max: 22
  dialogue:
    ratio_min: 0.20
    max_consecutive_lines: 8
  paragraph:
    max_sentences: 5
    max_words: 300
  emotional_beat:
    min_per_1k: 1.4
  satisfaction_beat:
    min_count: 3
  suspense_hook:
    required: true
